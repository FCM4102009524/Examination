<!DOCTYPE html>
<html>
  <head>
    <title>Examination Project</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="house" src="https://raw.githack.com/FCM4102009524/Examination/main/model3/scene.gltf"></a-asset-item>
        <a-asset-item id="teapot" src="https://raw.githack.com/FCM4102009524/Examination/main/teapot/scene.gltf"></a-asset-item>
        <a-asset-item id="cup" src="https://raw.githack.com/FCM4102009524/Examination/main/coffee_cups/scene.gltf"></a-asset-item>
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="100" height="100" color="#7BC8A4"></a-plane>

      <a-entity light="type: ambient; intensity: 0.7"></a-entity>
      <a-entity light="type: directional; intensity: 0.6" position="-1 2 1"></a-entity>

      <a-entity gltf-model="#house" position="0 0 -8" scale="1 1 1"></a-entity>
      <a-entity gltf-model="#teapot" position="2 1.2 -4" scale="0.5 0.5 0.5"></a-entity>
      <a-entity gltf-model="#cup" position="-2 1.2 -4" scale="0.1 0.1 0.1"></a-entity>

      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>
  </body>
</html>
