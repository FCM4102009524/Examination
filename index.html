<!DOCTYPE html>
<html>
  <head>
    <title>Examination Project</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="house" src="model3/scene.gltf"></a-asset-item>
        <a-asset-item id="book" src="books/scene.gltf"></a-asset-item>
        <a-asset-item id="cup" src="coffee_cups/scene.gltf"></a-asset-item>
        <a-asset-item id="samsung" src="samsung_remote/scene.gltf"></a-asset-item>
        <a-asset-item id="ac" src="airConditon_remote/scene.gltf"></a-asset-item>
        <a-asset-item id="teapot" src="teapot/scene.gltf"></a-asset-item>
      </a-assets>

      <a-sky color="#ECECEC"></a-sky>

      <a-entity gltf-model="#house" position="0 0 -5"></a-entity>
      <a-entity gltf-model="#book" position="-1 1 -3" scale="0.1 0.1 0.1"></a-entity>
      <a-entity gltf-model="#cup" position="0 1 -3" scale="0.1 0.1 0.1"></a-entity>
      <a-entity gltf-model="#teapot" position="1 1 -3" scale="0.05 0.05 0.05"></a-entity>

      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>
  </body>
</html>
